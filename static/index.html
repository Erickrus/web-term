<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #connection-bar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: #f5f5f5;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #ddd;
    }
    #connection-bar input {
      background: #fff;
      border: 1px solid #ccc;
      color: #333;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
    }
    #connection-bar input[name="url"] { flex: 1; min-width: 300px; }
    #connection-bar input[name="token"] { width: 220px; }
    #connection-bar button {
      padding: 6px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: #1677ff;
      color: #fff;
    }
    #connection-bar button:hover { background: #4096ff; }
    #connection-bar button.active { background: #0958d9; }
    #status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #e0e0e0;
      color: #333;
    }
    #status.connected { background: #c8e6c9; color: #2e7d32; }
    #status.disconnected { background: #ffcdd2; color: #c62828; }
    .xterm-rows span {
      overflow: hidden;
    }
    #terminal-container { position: relative; }
    #copy-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      overflow: hidden;
      white-space: pre;
      user-select: text;
      -webkit-user-select: text;
      color: transparent;
      background: rgba(22, 119, 255, 0.04);
      cursor: text;
    }
  </style>
</head>
<body>
  <div id="connection-bar">
    <input name="url" placeholder="ws://localhost:8888/ws (leave empty for auto)" value="">
    <input name="token" type="password" placeholder="Token (optional)">
    <button id="btn-connect">Connect</button>
    <button id="btn-disconnect">Disconnect</button>
    <button id="btn-copy">Copy</button>
    <span id="status" class="disconnected">disconnected</span>
  </div>
  <div id="terminal-container" style="flex:1; overflow:hidden;"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.8.0/lib/addon-unicode11.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-canvas@0.7.0/lib/addon-canvas.min.js"></script>

  <script type="module">
    import { TerminalUI } from '/static/js/terminal-ui.js';
    import { TerminalConnection } from '/static/js/terminal-connection.js';

    const urlInput = document.querySelector('input[name="url"]');
    const tokenInput = document.querySelector('input[name="token"]');
    const btnConnect = document.getElementById('btn-connect');
    const btnDisconnect = document.getElementById('btn-disconnect');
    const btnCopy = document.getElementById('btn-copy');
    const statusEl = document.getElementById('status');
    const termContainer = document.getElementById('terminal-container');

    // Extract token from URL query param and strip it from address bar
    const params = new URLSearchParams(location.search);
    if (params.has('token')) {
      tokenInput.value = params.get('token');
      const cleanUrl = location.pathname;
      history.replaceState(null, '', cleanUrl);
    }

    const termUI = new TerminalUI(document.getElementById('terminal-container'));
    const term = termUI.init();

    const connection = new TerminalConnection();
    connection.attachTerminal(term);
    connection.onStatus((status) => {
      statusEl.textContent = status;
      statusEl.className = status;
    });

    function getWsUrl() {
      if (urlInput.value.trim()) return urlInput.value.trim();
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${proto}//${location.host}/ws`;
    }

    function connect() {
      const url = getWsUrl();
      const token = tokenInput.value.trim() || null;
      connection.connect(url, token);
    }

    function disconnect() {
      connection.disconnect();
    }

    btnConnect.addEventListener('click', connect);
    btnDisconnect.addEventListener('click', disconnect);

    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connect();
    });
    tokenInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connect();
    });

    let copyMode = false;
    let copyOverlay = null;

    function enterCopyMode() {
      copyMode = true;
      btnCopy.classList.add('active');
      copyOverlay = document.createElement('div');
      copyOverlay.id = 'copy-overlay';

      const buffer = term.buffer.active;
      const fontSize = term.options.fontSize || 14;
      const fontFamily = term.options.fontFamily || 'monospace';
      const cellHeight = term._core._renderService.dimensions.css.cell.height;
      const cellWidth = term._core._renderService.dimensions.css.cell.width;

      copyOverlay.style.fontFamily = fontFamily;
      copyOverlay.style.fontSize = fontSize + 'px';
      copyOverlay.style.lineHeight = cellHeight + 'px';
      copyOverlay.style.letterSpacing = '0px';

      const termEl = termContainer.querySelector('.xterm-screen');
      if (termEl) {
        copyOverlay.style.paddingTop = getComputedStyle(termEl).paddingTop;
        copyOverlay.style.paddingLeft = getComputedStyle(termEl).paddingLeft;
      }

      let text = '';
      for (let i = 0; i < term.rows; i++) {
        const line = buffer.getLine(i + buffer.viewportY);
        if (line) {
          let lineText = line.translateToString(false);
          lineText = lineText.replace(/\s+$/, '');
          text += lineText + '\n';
        } else {
          text += '\n';
        }
      }
      copyOverlay.textContent = text;

      const charSpan = document.createElement('span');
      charSpan.style.fontFamily = fontFamily;
      charSpan.style.fontSize = fontSize + 'px';
      charSpan.style.position = 'absolute';
      charSpan.style.visibility = 'hidden';
      charSpan.textContent = 'M';
      document.body.appendChild(charSpan);
      const measuredWidth = charSpan.getBoundingClientRect().width;
      document.body.removeChild(charSpan);

      if (Math.abs(measuredWidth - cellWidth) > 0.5) {
        copyOverlay.style.transform = `scaleX(${cellWidth / measuredWidth})`;
        copyOverlay.style.transformOrigin = 'top left';
      }

      termContainer.appendChild(copyOverlay);
    }

    function exitCopyMode() {
      copyMode = false;
      btnCopy.classList.remove('active');
      if (copyOverlay && copyOverlay.parentNode) {
        copyOverlay.parentNode.removeChild(copyOverlay);
      }
      copyOverlay = null;
    }

    btnCopy.addEventListener('click', () => {
      if (copyMode) {
        exitCopyMode();
      } else {
        enterCopyMode();
      }
    });

    document.addEventListener('copy', () => {
      if (copyMode) {
        setTimeout(exitCopyMode, 50);
      }
    });

    term.write('Web Terminal - press Connect or Enter to start\r\n');
    setTimeout(connect, 300);
  </script>
</body>
</html>
